description: FTI Consulting bills under professional-services engagements (hourly, fixed-fee, or
  retainer) rather than as a SaaS or API surface. FinOps treatment focuses on engagement-level
  budget allocation and burn-rate tracking.
notes: No public API or pricing surface; FinOps shape inferred from a professional-services
  engagement model.
