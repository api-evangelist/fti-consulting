meters:
  - name: consulting_hours
    unit: hour
    aggregation: sum
    dimensions:
      - engagement
      - resource_level
  - name: fixed_fee_milestones
    unit: milestone
    aggregation: count
    dimensions:
      - engagement
  - name: expenses
    unit: USD
    aggregation: sum
    dimensions:
      - engagement
      - category
principles:
  - name: Visibility
    description: Reconcile FTI invoices against engagement statements of work; track hours-burned
      against approved budget per workstream.
  - name: Allocation
    description: Tag every engagement to a sponsoring business unit; allocate fixed-fee
      milestones at completion.
  - name: Optimization
    description: Negotiate tiered rate cards by resource level; consider blended-rate or capped
      fixed-fee structures for predictable scopes.
  - name: Accountability
    description: Engagement sponsor owns burn-rate; PMO reviews variance vs SOW monthly.
